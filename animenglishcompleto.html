<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Aprenda inglês com estilo anime!">
  <meta name="theme-color" content="#0d0d1a">
  <title>AnimeEnglish ⚔️</title>
  <style>
/* ── Reset & Base ───────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d1a;
  --bg2: #13132a;
  --bg3: #1a1a35;
  --card: #1e1e3a;
  --card2: #252548;
  --primary: #7c3aed;
  --primary-bright: #9d5cf7;
  --accent: #f59e0b;
  --accent2: #fb923c;
  --success: #10b981;
  --danger: #ef4444;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --glow-purple: 0 0 20px rgba(124, 58, 237, 0.4);
  --glow-gold: 0 0 20px rgba(245, 158, 11, 0.4);
  --border: rgba(255,255,255,0.08);
  --radius: 16px;
  --radius-sm: 10px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow-x: hidden;
}

#app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Screens ────────────────────────────────────────────────────────────────── */
.screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 16px;
  max-width: 480px;
  margin: 0 auto;
  width: 100%;
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Home Screen ────────────────────────────────────────────────────────────── */
.home-screen {
  position: relative;
  overflow: hidden;
}

.home-bg-deco {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
}

.deco-kanji {
  position: absolute;
  top: -20px; right: -20px;
  font-size: 180px;
  color: rgba(124,58,237,0.04);
  font-weight: 900;
  line-height: 1;
  user-select: none;
}

.deco-kanji2 {
  position: absolute;
  bottom: 60px; left: -30px;
  font-size: 140px;
  color: rgba(245,158,11,0.04);
  font-weight: 900;
  line-height: 1;
  user-select: none;
}

.home-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 24px;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}

.title-jp {
  font-size: 13px;
  letter-spacing: 4px;
  color: var(--primary-bright);
  text-transform: uppercase;
  display: block;
  margin-bottom: 4px;
}

.main-title {
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, #9d5cf7, #f59e0b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}

.subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 6px;
}

.mascot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.mascot-body {
  font-size: 52px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}

.mascot-bubble {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 12px 12px 12px 0;
  padding: 6px 10px;
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  position: relative;
}

/* ── Player Card ────────────────────────────────────────────────────────────── */
.player-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
  box-shadow: var(--glow-purple);
  position: relative;
  z-index: 1;
}

.player-info {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.player-level {
  background: linear-gradient(135deg, var(--primary), var(--primary-bright));
  color: #fff;
  font-weight: 800;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

.player-name {
  font-weight: 700;
  font-size: 16px;
  color: var(--text);
}

.xp-bar-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.xp-bar {
  height: 8px;
  background: var(--bg3);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 4px;
}

.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #f59e0b);
  border-radius: 10px;
  transition: width 0.6s ease;
}

.xp-bar-sub {
  font-size: 11px;
  color: var(--text-dim);
}

/* ── Buttons ────────────────────────────────────────────────────────────────── */
.btn {
  border: none;
  cursor: pointer;
  font-weight: 700;
  border-radius: 12px;
  padding: 14px 24px;
  font-size: 15px;
  transition: all 0.15s ease;
  letter-spacing: 0.3px;
}

.btn:active { transform: scale(0.96); }

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-bright));
  color: #fff;
  box-shadow: 0 4px 20px rgba(124,58,237,0.35);
}

.btn-primary:hover { box-shadow: 0 4px 28px rgba(124,58,237,0.55); }

.btn-secondary {
  background: var(--card2);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover { border-color: var(--primary); }

.btn-success {
  background: linear-gradient(135deg, var(--success), #34d399);
  color: #fff;
  box-shadow: 0 4px 20px rgba(16,185,129,0.35);
}

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.btn-large { width: 100%; font-size: 17px; padding: 16px; }

.home-buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
}

.btn-back {
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  transition: color 0.15s;
}
.btn-back:hover { color: var(--text); }

.home-stats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.stat-pill {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text-muted);
}

/* ── Episode Select ─────────────────────────────────────────────────────────── */
.screen-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-top: 8px;
}

.screen-header h2 {
  font-size: 20px;
  font-weight: 800;
  flex: 1;
}

.episode-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 20px;
}

.episode-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-left: 4px solid var(--ep-color, var(--primary));
  position: relative;
  overflow: hidden;
}

.episode-card::before {
  content: "";
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  background: radial-gradient(circle, var(--ep-color, var(--primary)) 0%, transparent 70%);
  opacity: 0.08;
  border-radius: 50%;
}

.episode-card:hover { transform: translateX(4px); border-color: var(--ep-color, var(--primary)); box-shadow: -4px 0 20px rgba(0,0,0,0.3); }
.episode-card.done { opacity: 0.75; }

.ep-icon { font-size: 28px; margin-bottom: 4px; }
.ep-num { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.ep-title { font-size: 18px; font-weight: 800; margin: 2px 0; }
.ep-title-en { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
.ep-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.4; }

.ep-footer {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.ep-xp {
  background: rgba(245,158,11,0.15);
  color: var(--accent);
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 12px;
  font-weight: 700;
}

.ep-words {
  color: var(--text-dim);
  font-size: 12px;
}

.ep-done-badge {
  margin-left: auto;
  color: var(--success);
  font-size: 13px;
  font-weight: 700;
}

.ep-start {
  margin-left: auto;
  color: var(--primary-bright);
  font-size: 13px;
  font-weight: 700;
}

/* ── Lesson Header ─────────────────────────────────────────────────────────── */
.lesson-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-top: 8px;
}

.lesson-ep-title {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
}

.lesson-phase-badge {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--text-muted);
}

/* ── Progress ──────────────────────────────────────────────────────────────── */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--bg3);
  border-radius: 6px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 6px;
  transition: width 0.4s ease;
}

.progress-text {
  font-size: 12px;
  color: var(--text-dim);
  min-width: 36px;
  text-align: right;
}

/* ── Study Card ────────────────────────────────────────────────────────────── */
.study-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-bottom: 16px;
  box-shadow: var(--glow-purple);
}

.study-card:hover { transform: scale(1.01); box-shadow: 0 8px 40px rgba(124,58,237,0.3); }
.study-card:active { transform: scale(0.98); }

.study-emoji { font-size: 72px; margin-bottom: 16px; animation: pulse 2s ease-in-out infinite; }

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.06); }
}

.study-en {
  font-size: 40px;
  font-weight: 900;
  background: linear-gradient(135deg, #fff, #cbd5e1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.study-pt {
  font-size: 24px;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 12px;
}

.study-audio-hint {
  font-size: 12px;
  color: var(--text-dim);
}

/* ── Example Block ─────────────────────────────────────────────────────────── */
.example-block {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 20px;
}

.example-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.example-en {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  font-style: italic;
}

.example-pt {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.btn-listen {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-listen:hover { border-color: var(--primary); color: var(--text); }

/* ── Study Navigation ──────────────────────────────────────────────────────── */
.study-nav {
  display: flex;
  gap: 10px;
  justify-content: space-between;
  margin-bottom: 16px;
}

.study-nav .btn { flex: 1; }

.study-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  padding-bottom: 16px;
}

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--bg3);
  transition: all 0.3s;
}

.dot.done { background: var(--primary); opacity: 0.5; }
.dot.active { background: var(--accent); transform: scale(1.4); }

/* ── Quiz ──────────────────────────────────────────────────────────────────── */
.quiz-score {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
}

.streak-badge {
  background: linear-gradient(135deg, #f59e0b, #fb923c);
  color: #fff;
  font-size: 14px;
  font-weight: 800;
  padding: 8px 16px;
  border-radius: 20px;
  text-align: center;
  margin-bottom: 12px;
  animation: shakeIn 0.3s ease;
}

@keyframes shakeIn {
  0%   { transform: scale(0.8); }
  60%  { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.quiz-question {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  margin-bottom: 16px;
  box-shadow: var(--glow-purple);
}

.quiz-word-emoji { font-size: 60px; margin-bottom: 10px; }

.quiz-word-en {
  font-size: 36px;
  font-weight: 900;
  color: var(--text);
  cursor: pointer;
  margin-bottom: 6px;
}

.quiz-listen { font-size: 20px; opacity: 0.6; }
.quiz-instruction { font-size: 14px; color: var(--text-muted); }

.quiz-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.quiz-option {
  background: var(--card);
  border: 2px solid var(--border);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 16px 10px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  min-height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.quiz-option:hover:not(:disabled) {
  border-color: var(--primary);
  background: var(--card2);
  transform: scale(1.02);
}

.quiz-option.correct {
  background: rgba(16,185,129,0.2);
  border-color: var(--success);
  color: var(--success);
  animation: correctPop 0.3s ease;
}

.quiz-option.wrong {
  background: rgba(239,68,68,0.15);
  border-color: var(--danger);
  color: var(--danger);
  animation: wrongShake 0.3s ease;
}

@keyframes correctPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.07); }
  100% { transform: scale(1); }
}

@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}

.quiz-feedback {
  text-align: center;
  min-height: 40px;
}

.feedback {
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  display: inline-block;
  animation: fadeIn 0.2s ease;
}

.correct-msg { background: rgba(16,185,129,0.15); color: var(--success); }
.wrong-msg   { background: rgba(239,68,68,0.12); color: var(--danger); }

/* ── Result Screen ─────────────────────────────────────────────────────────── */
.result-screen {
  align-items: center;
  justify-content: center;
  gap: 20px;
  text-align: center;
}

.result-top { display: flex; flex-direction: column; align-items: center; gap: 10px; }

.result-grade {
  font-size: 80px;
  font-weight: 900;
  line-height: 1;
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.grade-s { background: linear-gradient(135deg, #f59e0b, #fb923c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.grade-a { background: linear-gradient(135deg, #7c3aed, #9d5cf7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.grade-b { background: linear-gradient(135deg, #2563eb, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.grade-c { background: linear-gradient(135deg, #64748b, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

.result-msg { font-size: 20px; font-weight: 700; color: var(--text); }

.perfect-banner {
  background: linear-gradient(135deg, #f59e0b, #fb923c);
  color: #fff;
  font-size: 16px;
  font-weight: 900;
  padding: 10px 24px;
  border-radius: 20px;
  letter-spacing: 1px;
  animation: shakeIn 0.3s ease;
}

.result-stats {
  display: flex;
  gap: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  width: 100%;
}

.rs-item { flex: 1; }
.rs-value { font-size: 28px; font-weight: 900; color: var(--accent); }
.rs-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.levelup-banner {
  background: linear-gradient(135deg, var(--primary), var(--primary-bright));
  color: #fff;
  font-size: 18px;
  font-weight: 800;
  padding: 14px 24px;
  border-radius: var(--radius-sm);
  width: 100%;
  animation: shakeIn 0.4s ease;
}

.ach-section {
  background: var(--card);
  border: 1px solid rgba(245,158,11,0.2);
  border-radius: var(--radius);
  padding: 16px;
  width: 100%;
  text-align: left;
}

.ach-section h3 { font-size: 15px; margin-bottom: 10px; color: var(--accent); }

.ach-unlock {
  font-size: 14px;
  color: var(--text);
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}

.ach-unlock:last-child { border-bottom: none; }

.result-buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
}

/* ── Achievements Screen ──────────────────────────────────────────────────── */
.ach-count {
  font-size: 14px;
  color: var(--accent);
  font-weight: 700;
}

.ach-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 20px;
}

.ach-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex;
  gap: 14px;
  align-items: center;
  transition: all 0.2s;
}

.ach-card.unlocked { border-color: rgba(245,158,11,0.3); box-shadow: 0 0 16px rgba(245,158,11,0.1); }
.ach-card.locked { opacity: 0.5; }

.ach-icon { font-size: 32px; min-width: 40px; text-align: center; }
.ach-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.ach-desc { font-size: 12px; color: var(--text-muted); }

/* ── Home Progress Row ─────────────────────────────────────────────────────── */
.home-progress-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
}

.home-prog-item {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 6px;
  text-align: center;
}

.home-prog-icon { font-size: 18px; margin-bottom: 2px; }
.home-prog-val  { font-size: 16px; font-weight: 800; color: var(--accent); }
.home-prog-label{ font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* ── Episode Tabs ───────────────────────────────────────────────────────────── */
.ep-tabs-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
}

.ep-tab {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 700;
  padding: 8px 6px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.ep-tab.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 12px rgba(124,58,237,0.4);
}

/* ── Episode Card Badge ─────────────────────────────────────────────────────── */
.ep-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.ep-type-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

.vocab-badge   { background: rgba(52,152,219,0.15); color: #3498db; }

  <script>
// AnimeEnglish — App Logic

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  screen: "home",
  currentEpisode: null,
  lessonPhase: "study",   // study | quiz
  studyIndex: 0,
  quizWords: [],
  quizIndex: 0,
  quizScore: 0,
  streak: 0,
  resultData: null,
  episodeFilter: "all",   // all | vocabulary | grammar
  stats: loadStats(),
};

function loadStats() {
  try { return JSON.parse(localStorage.getItem("animenglish_stats")) || defaultStats(); }
  catch { return defaultStats(); }
}
function defaultStats() {
  return { totalXP: 0, level: 1, lessonsCompleted: 0, perfectLessons: 0,
           bestStreak: 0, completedEpisodes: [], unlockedAchievements: [] };
}
function saveStats() {
  localStorage.setItem("animenglish_stats", JSON.stringify(state.stats));
}

// ─── Speech ───────────────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "en-US"; utt.rate = 0.85;
  const v = window.speechSynthesis.getVoices().find(v => v.lang.startsWith("en"));
  if (v) utt.voice = v;
  window.speechSynthesis.speak(utt);
}

// ─── XP & Level ───────────────────────────────────────────────────────────────
function addXP(amount) {
  state.stats.totalXP += amount;
  const newLevel = Math.floor(state.stats.totalXP / 100) + 1;
  const levelUp = newLevel > state.stats.level;
  state.stats.level = newLevel;
  return levelUp;
}
function getXPProgress() {
  const cur = state.stats.totalXP % 100;
  return { current: cur, pct: cur };
}

// ─── Achievements ─────────────────────────────────────────────────────────────
function checkAchievements() {
  const newOnes = [];
  for (const a of ACHIEVEMENTS) {
    if (!state.stats.unlockedAchievements.includes(a.id) && a.condition(state.stats)) {
      state.stats.unlockedAchievements.push(a.id);
      newOnes.push(a);
    }
  }
  return newOnes;
}

// ─── Render Router ────────────────────────────────────────────────────────────
const app = document.getElementById("app");
function render() {
  switch (state.screen) {
    case "home":           renderHome(); break;
    case "episode-select": renderEpisodeSelect(); break;
    case "lesson":         renderLesson(); break;
    case "result":         renderResult(); break;
    case "achievements":   renderAchievements(); break;
  }
}

  const { level, totalXP } = state.stats;

  app.innerHTML = `

        <div class="mascot">
          <div class="mascot-body">🥷</div>
          <div class="mascot-bubble">Vamos aprender juntos!</div>
        </div>
      </div>
      <div class="player-card">
        <div class="player-info">
          <div class="player-level">Nível ${level}</div>
          <div class="player-name">Aprendiz Ninja</div>
        </div>
        <div class="xp-bar-label">${totalXP} XP total</div>
        <div class="xp-bar"><div class="xp-fill" style="width:${xp.pct}%"></div></div>
        <div class="xp-bar-sub">${xp.current}/100 XP para o próximo nível</div>
      </div>
      <div class="home-progress-row">
        <div class="home-prog-item">
          <div class="home-prog-icon">📖</div>
          <div class="home-prog-val">${vocabDone}/${EPISODES.filter(e=>e.type==="vocabulary").length}</div>
          <div class="home-prog-label">Vocabulário</div>
        </div>
        <div class="home-prog-item">
          <div class="home-prog-icon">📝</div>
          <div class="home-prog-val">${grammarDone}/${EPISODES.filter(e=>e.type==="grammar").length}</div>
          <div class="home-prog-label">Gramática</div>
        </div>
        <div class="home-prog-item">
          <div class="home-prog-icon">🔥</div>
          <div class="home-prog-val">${state.stats.bestStreak}</div>
          <div class="home-prog-label">Melhor Série</div>
        </div>
        <div class="home-prog-item">
          <div class="home-prog-icon">🏆</div>
          <div class="home-prog-val">${state.stats.unlockedAchievements.length}/${ACHIEVEMENTS.length}</div>
          <div class="home-prog-label">Conquistas</div>
        </div>
      </div>
      <div class="home-buttons">
        <button class="btn btn-primary btn-large" onclick="goTo('episode-select')">⚔️ Iniciar Missão</button>
        <button class="btn btn-secondary" onclick="goTo('achievements')">🏆 Ver Conquistas</button>
      </div>
    </div>`;
}

// ─── Episode Select ───────────────────────────────────────────────────────────
function renderEpisodeSelect() {
  const f = state.episodeFilter;
  const tabs = ["all","vocabulary","grammar"].map(t => {
    const label = t === "all" ? "🗺️ Todos" : t === "vocabulary" ? "📖 Vocabulário" : "📝 Gramática";
    return `<button class="ep-tab ${f===t?"active":""}" onclick="setFilter('${t}')">${label}</button>`;
  }).join("");

  const list = EPISODES.filter(ep => f === "all" || ep.type === f);
  const cards = list.map((ep, _i) => {
    const realIdx = EPISODES.indexOf(ep);
    const done = state.stats.completedEpisodes.includes(ep.id);
    const badge = ep.type === "grammar"
      ? `<span class="ep-type-badge grammar-badge">📝 GRAMÁTICA</span>`
      : `<span class="ep-type-badge vocab-badge">📖 VOCABULÁRIO</span>`;
    return `
      <div class="episode-card ${done?"done":""}" onclick="startEpisode(${realIdx})" style="--ep-color:${ep.color}">
        <div class="ep-card-top">
          <div class="ep-icon">${ep.icon}</div>
          ${badge}
        </div>
        <div class="ep-num">Episódio ${ep.id}</div>
        <div class="ep-title">${ep.title}</div>
        <div class="ep-title-en">${ep.titleEn}</div>
        <div class="ep-desc">${ep.description}</div>
        <div class="ep-footer">
          <span class="ep-xp">+${ep.xpReward} XP</span>
          <span class="ep-words">${ep.words.length} exercícios</span>
          ${done ? '<span class="ep-done-badge">✅ Concluído</span>' : '<span class="ep-start">Jogar →</span>'}
        </div>
      </div>`;
  }).join("");

  app.innerHTML = `
    <div class="screen episode-screen">
      <div class="screen-header">
        <button class="btn-back" onclick="goTo('home')">← Voltar</button>
        <h2>Escolha seu Episódio</h2>
      </div>
      <div class="ep-tabs-wrap">${tabs}</div>
      <div class="episode-grid">${cards}</div>
    </div>`;
}

function setFilter(f) {
  state.episodeFilter = f;
  renderEpisodeSelect();
}

// ─── Lesson ───────────────────────────────────────────────────────────────────
function startEpisode(index) {
  state.currentEpisode = EPISODES[index];
  state.lessonPhase = "study";
  state.studyIndex = 0;
  state.quizScore = 0;
  state.streak = 0;
  state.quizWords = shuffle([...state.currentEpisode.words]);
  state.quizIndex = 0;
  state.screen = "lesson";
  render();
}

function renderLesson() {
  state.lessonPhase === "study" ? renderStudyCard() : renderQuiz();
}

// ─── Study Card ───────────────────────────────────────────────────────────────
function renderStudyCard() {
  const ep = state.currentEpisode;
  const word = ep.words[state.studyIndex];
  const total = ep.words.length;
  const progress = ((state.studyIndex + 1) / total) * 100;
  const isGrammar = ep.type === "grammar";

  let cardHtml;
  if (isGrammar) {
    const sentenceHL = word.en.replace("___", `<span class="answer-hl">${word.pt}</span>`);
    cardHtml = `
      <div class="study-card grammar-card" onclick="speak('${word.example.replace(/'/g,"\\'")}')">
        <div class="study-emoji">${word.emoji}</div>
        <div class="grammar-sentence-display">${sentenceHL}</div>
        <div class="study-pt">${word.examplePt}</div>
        <div class="grammar-rule-tag">💡 ${word.rule}</div>
        <div class="study-audio-hint">🔊 Clique para ouvir o exemplo</div>
      </div>`;
  } else {
    cardHtml = `
      <div class="study-card" onclick="speak('${word.en.replace(/'/g,"\\'")}')">
        <div class="study-emoji">${word.emoji}</div>
        <div class="study-en">${word.en}</div>
        <div class="study-pt">${word.pt}</div>
        <div class="study-audio-hint">🔊 Clique para ouvir</div>
      </div>`;
  }

  const tipBox = isGrammar ? `
    <div class="grammar-tip-box">
      <span class="tip-label">📌 Regra do Episódio:</span>
      <span class="tip-text">${ep.grammarTip}</span>
    </div>` : "";

  app.innerHTML = `
    <div class="screen lesson-screen">
      <div class="lesson-header">
        <button class="btn-back" onclick="goTo('episode-select')">← Sair</button>
        <div class="lesson-ep-title">${ep.icon} ${ep.title}</div>
        <div class="lesson-phase-badge">📖 Estudar</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        <div class="progress-text">${state.studyIndex + 1} / ${total}</div>
      </div>
      ${tipBox}
      ${cardHtml}
      <div class="example-block">
        <div class="example-label">Exemplo em Batalha:</div>
        <div class="example-en">"${word.example}"</div>
        <div class="example-pt">${word.examplePt}</div>
        <button class="btn-listen" onclick="event.stopPropagation(); speak('${word.example.replace(/'/g,"\\'")}')">
          🔊 Ouvir exemplo
        </button>
      </div>
      <div class="study-nav">
        ${state.studyIndex > 0
          ? `<button class="btn btn-ghost" onclick="prevStudy()">← Anterior</button>`
          : `<div></div>`}
        ${state.studyIndex < total - 1
          ? `<button class="btn btn-primary" onclick="nextStudy()">Próxima →</button>`
          : `<button class="btn btn-success" onclick="startQuiz()">⚡ Iniciar Quiz!</button>`}
      </div>
      <div class="study-dots">
        ${ep.words.map((_,i) =>
          `<span class="dot ${i===state.studyIndex?"active":i<state.studyIndex?"done":""}"></span>`
        ).join("")}
      </div>
    </div>`;

  setTimeout(() => speak(isGrammar ? word.example : word.en), 400);
}

function nextStudy() { state.studyIndex++; render(); }
function prevStudy() { state.studyIndex--; render(); }

function startQuiz() {
  state.lessonPhase = "quiz";
  state.quizIndex = 0;
  state.quizScore = 0;
  state.streak = 0;
  state.quizWords = shuffle([...state.currentEpisode.words]);
  render();
}

// ─── Quiz ─────────────────────────────────────────────────────────────────────
function renderQuiz() {
  const ep = state.currentEpisode;
  const isGrammar = ep.type === "grammar";
  const word = state.quizWords[state.quizIndex];
  const total = state.quizWords.length;
  const progress = (state.quizIndex / total) * 100;

  let questionHtml, optionsHtml, correctKey;

  if (isGrammar) {
    correctKey = word.pt;
    const blank = word.en.replace("___", '<span class="blank-slot">___</span>');
    questionHtml = `
      <div class="quiz-question">
        <div class="quiz-word-emoji">${word.emoji}</div>
        <div class="grammar-quiz-sentence">${blank}</div>
        <div class="quiz-instruction">Complete a frase — escolha a palavra certa:</div>
      </div>`;
    const pool = (ep.grammarOptions || ["???"])
      .map(pt => ({ pt }));
    optionsHtml = shuffle([...pool]).map(opt => `
      <button class="quiz-option grammar-opt" data-val="${opt.pt}"
        onclick="checkAnswer('${opt.pt.replace(/'/g,"\\'")}','${correctKey.replace(/'/g,"\\'")}',this)">
        ${opt.pt}
      </button>`).join("");
  } else {
    correctKey = word.en;
    const others = ep.words.filter(w => w.en !== word.en);
    const options = shuffle([word, ...shuffle(others).slice(0,3)]);
    questionHtml = `
      <div class="quiz-question">
        <div class="quiz-word-emoji">${word.emoji}</div>
        <div class="quiz-word-en" onclick="speak('${word.en.replace(/'/g,"\\'")}')">
          ${word.en} <span class="quiz-listen">🔊</span>
        </div>
        <div class="quiz-instruction">Qual é a tradução em português?</div>
      </div>`;
    optionsHtml = options.map(opt => `
      <button class="quiz-option" data-val="${opt.en}"
        onclick="checkAnswer('${opt.en.replace(/'/g,"\\'")}','${correctKey.replace(/'/g,"\\'")}',this)">
        ${opt.emoji} ${opt.pt}
      </button>`).join("");
  }

  const streakBadge = state.streak >= 3
    ? `<div class="streak-badge">🔥 Série: ${state.streak}!</div>` : "";

  app.innerHTML = `
    <div class="screen quiz-screen">
      <div class="lesson-header">
        <button class="btn-back" onclick="goTo('episode-select')">← Sair</button>
        <div class="lesson-ep-title">${ep.icon} Quiz</div>
        <div class="quiz-score">⭐ ${state.quizScore}/${total}</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        <div class="progress-text">${state.quizIndex + 1} / ${total}</div>
      </div>
      ${streakBadge}
      ${questionHtml}
      <div class="quiz-options ${isGrammar?"grammar-options":""}">${optionsHtml}</div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
    </div>`;

  if (!isGrammar) setTimeout(() => speak(word.en), 300);
}

function checkAnswer(chosen, correct, btn) {
  document.querySelectorAll(".quiz-option").forEach(b => b.disabled = true);
  const word = state.quizWords[state.quizIndex];
  const isCorrect = chosen === correct;
  const fb = document.getElementById("quiz-feedback");

  if (isCorrect) {
    btn.classList.add("correct");
    state.quizScore++;
    state.streak++;
    if (state.streak > state.stats.bestStreak) state.stats.bestStreak = state.streak;
    fb.innerHTML = `<div class="feedback correct-msg">✅ Correto! ${state.streak >= 3 ? "🔥 Série incrível!" : "Ótimo trabalho!"}</div>`;
    playSound("correct");
  } else {
    btn.classList.add("wrong");
    document.querySelectorAll(".quiz-option").forEach(b => {
      if (b.dataset.val === correct) b.classList.add("correct");
    });
    state.streak = 0;
    const correctLabel = state.currentEpisode.type === "grammar" ? correct : word.pt;
    fb.innerHTML = `<div class="feedback wrong-msg">❌ Era: <strong>${correctLabel}</strong></div>`;
    playSound("wrong");
  }

  setTimeout(() => {
    state.quizIndex++;
    state.quizIndex >= state.quizWords.length ? finishLesson() : render();
  }, 1500);
}

// ─── Result ───────────────────────────────────────────────────────────────────
function finishLesson() {
  const ep = state.currentEpisode;
  const total = state.quizWords.length;
  const score = state.quizScore;
  const pct = Math.round((score / total) * 100);
  const perfect = score === total;

  state.stats.lessonsCompleted++;
  if (!state.stats.completedEpisodes.includes(ep.id)) state.stats.completedEpisodes.push(ep.id);
  if (perfect) state.stats.perfectLessons++;

  const xpGained = Math.round(ep.xpReward * (pct / 100));
  const levelUp = addXP(xpGained);
  const newAch = checkAchievements();
  saveStats();

  state.screen = "result";
  state.resultData = { score, total, pct, xpGained, levelUp, newAch, perfect };
  render();
}

function renderResult() {
  const { score, total, pct, xpGained, levelUp, newAch, perfect } = state.resultData;
  const ep = state.currentEpisode;
  const epIdx = EPISODES.indexOf(ep);

  let grade, gradeMsg;
  if (pct===100) { grade="S"; gradeMsg="Perfeito! Você é um mestre!"; }
  else if (pct>=80) { grade="A"; gradeMsg="Excelente, guerreiro!"; }
  else if (pct>=60) { grade="B"; gradeMsg="Bom trabalho, continue!"; }
  else { grade="C"; gradeMsg="Continue praticando, você consegue!"; }

  const achHtml = newAch.map(a =>
    `<div class="ach-unlock">${a.icon} <strong>${a.title}</strong> desbloqueada!</div>`
  ).join("");

  // Suggest next episode
  const nextEp = EPISODES[epIdx + 1];
  const nextBtn = nextEp
    ? `<button class="btn btn-secondary" onclick="startEpisode(${epIdx+1})">
         ▶️ ${nextEp.icon} Próximo: ${nextEp.title}
       </button>`
    : "";

  app.innerHTML = `
    <div class="screen result-screen">
      <div class="result-top">
        <div class="result-grade grade-${grade.toLowerCase()}">${grade}</div>
        <div class="result-msg">${gradeMsg}</div>
        ${perfect ? `<div class="perfect-banner">💯 PERFEITO! INCRÍVEL!</div>` : ""}
      </div>
      <div class="result-stats">
        <div class="rs-item"><div class="rs-value">${score}/${total}</div><div class="rs-label">Acertos</div></div>
        <div class="rs-item"><div class="rs-value">${pct}%</div><div class="rs-label">Precisão</div></div>
        <div class="rs-item"><div class="rs-value">+${xpGained}</div><div class="rs-label">XP ganho</div></div>
      </div>
      ${levelUp ? `<div class="levelup-banner">🎉 LEVEL UP! Você é Nível ${state.stats.level}!</div>` : ""}
      ${achHtml ? `<div class="ach-section"><h3>🏆 Conquistas Desbloqueadas!</h3>${achHtml}</div>` : ""}
      <div class="result-buttons">
        <button class="btn btn-primary" onclick="startEpisode(${epIdx})">🔄 Jogar Novamente</button>
        ${nextBtn}
        <button class="btn btn-ghost" onclick="goTo('episode-select')">📺 Todos os Episódios</button>
      </div>
    </div>`;
}

// ─── Achievements ─────────────────────────────────────────────────────────────
function renderAchievements() {
  const unlockedCount = state.stats.unlockedAchievements.length;
  const cards = ACHIEVEMENTS.map(a => {
    const unlocked = state.stats.unlockedAchievements.includes(a.id);
    return `
      <div class="ach-card ${unlocked?"unlocked":"locked"}">
        <div class="ach-icon">${unlocked ? a.icon : "🔒"}</div>
        <div class="ach-info">
          <div class="ach-title">${unlocked ? a.title : "???"}</div>
          <div class="ach-desc">${a.desc}</div>
        </div>
      </div>`;
  }).join("");

  app.innerHTML = `
    <div class="screen ach-screen">
      <div class="screen-header">
        <button class="btn-back" onclick="goTo('home')">← Voltar</button>
        <h2>🏆 Conquistas</h2>
        <div class="ach-count">${unlockedCount}/${ACHIEVEMENTS.length}</div>
      </div>
      <div class="ach-list">${cards}</div>
    </div>`;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function goTo(screen) { state.screen = screen; render(); }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === "correct") {
      osc.frequency.setValueAtTime(520, ctx.currentTime);
      osc.frequency.setValueAtTime(660, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
    } else {
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.setValueAtTime(200, ctx.currentTime + 0.15);
    }
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

// ─── Init ─────────────────────────────────────────────────────────────────────
if (window.speechSynthesis?.onvoiceschanged !== undefined) {
  window.speechSynthesis.onvoiceschanged = () => {};
}
render();

  </script>
